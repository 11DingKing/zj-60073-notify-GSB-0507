version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zj-60073-postgres
    environment:
      POSTGRES_DB: db_zj_60073
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123456
    ports:
      - "15073:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d db_zj_60073"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zj-60073-redis
    ports:
      - "16373:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
